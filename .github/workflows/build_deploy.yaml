# Build the Sphinx book (zh edition) and deploy it to GitHub Pages.
name: Build and Deploy

on:
  push:
    branches: [zh-translation]
  pull_request:
    branches: [zh-translation]
  workflow_dispatch:

# peaceiris pushes the built site to the gh-pages branch with GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install doc dependencies
        run: pip install -r requirements-docs.txt

      - name: Build (Sphinx zh edition, warnings as errors)
        run: sphinx-build -b html zh _build/html -W --keep-going

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: html
          path: _build/html

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/zh-translation'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build/html
          # No custom domain: the site serves at the org default,
          # https://spin6lock.github.io/modern-gpu-programming-for-mlsys/ . To use a custom domain, add a
          # `cname:` line here and the matching DNS record.
